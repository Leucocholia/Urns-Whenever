<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Whichever Lab</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Whichever v0.2</p>
          <h1>Urn programs, many outcomes</h1>
        </div>
        <div class="topbar-actions">
          <label class="select-label">
            Example
            <select id="example-select" aria-label="Example program"></select>
          </label>
        </div>
      </header>

      <section class="workspace" aria-label="Whichever workspace">
        <section class="editor-pane" aria-label="Program editor">
          <div class="pane-heading">
            <h2>Program</h2>
            <span id="parse-status" class="status-pill">Ready</span>
          </div>
          <textarea id="source-editor" spellcheck="false" aria-label="Whichever source code"></textarea>
          <div class="semantics-strip">
            <span>Declare initial state in <code>presets:</code>.</span>
            <span>Declare display order in <code>outputs:</code>.</span>
            <span>Every program needs <code>run_for</code> or <code>run_until</code>.</span>
          </div>
        </section>

        <section class="results-pane" aria-label="Simulation output">
          <div class="controls-grid">
            <label>
              Seed
              <input id="seed-input" type="text" value="whichever">
            </label>
            <label>
              Delay
              <input id="fps-input" type="range" min="0" max="1000" step="1" value="500">
            </label>
            <div class="fps-readout" id="fps-readout">500 ms</div>
            <div class="playback-buttons" aria-label="Playback controls">
              <button id="play-button" class="primary-button" type="button">Play</button>
            </div>
          </div>

          <div id="messages" class="messages" aria-live="polite"></div>

          <div class="results-grid">
            <section class="panel state-panel" aria-label="Current run urn state">
              <div class="pane-heading">
                <h2>Current Run</h2>
                <span id="run-meta" class="subtle"></span>
              </div>
              <div id="state-snapshot" class="urn-state" aria-live="polite"></div>
            </section>

            <section class="panel outputs-panel" aria-label="Completed run distributions">
              <div class="pane-heading">
                <h2>Distributions</h2>
                <span id="output-meta" class="subtle"></span>
              </div>
              <div class="chart-stack">
                <div class="distribution-controls" aria-label="Distribution chart controls">
                  <div class="stream-control-group">
                    <div class="control-title">Streams</div>
                    <div id="stream-controls" class="stream-controls" aria-label="Output stream visibility"></div>
                  </div>
                  <fieldset id="distribution-view-controls" class="segmented-control">
                    <legend>View</legend>
                    <div class="segmented-options">
                      <label>
                        <input type="radio" name="distribution-view" value="outputs" checked>
                        <span>Outputs</span>
                      </label>
                      <label>
                        <input type="radio" name="distribution-view" value="sum">
                        <span>Sum</span>
                      </label>
                      <label>
                        <input type="radio" name="distribution-view" value="joint">
                        <span>Joint</span>
                      </label>
                    </div>
                  </fieldset>
                  <fieldset id="histogram-mode-controls" class="segmented-control">
                    <legend>Layout</legend>
                    <div class="segmented-options">
                      <label>
                        <input type="radio" name="histogram-mode" value="neighboring" checked>
                        <span>Neighboring</span>
                      </label>
                      <label>
                        <input type="radio" name="histogram-mode" value="stacked">
                        <span>Stacked</span>
                      </label>
                      <label>
                        <input type="radio" name="histogram-mode" value="shaded">
                        <span>Shaded</span>
                      </label>
                    </div>
                  </fieldset>
                </div>
                <div id="fixed-conditions" class="fixed-conditions" hidden>
                  <div class="fixed-heading">
                    <span class="fixed-conditions-label">Fixed:</span>
                    <button id="fixed-clear" class="secondary-button compact-button" type="button">Clear</button>
                  </div>
                  <div id="fixed-sliders"></div>
                </div>
                <div class="chart-block" id="outputs-chart-block">
                  <div class="chart-title">Outputs</div>
                  <canvas id="marginal-chart" width="900" height="310" role="img" aria-label="Marginal histogram for each output variable"></canvas>
                </div>
                <div id="matrix-chart-block" class="chart-block" hidden>
                  <div id="matrix-chart-title" class="chart-title">Joint</div>
                  <canvas id="matrix-chart" width="900" height="420" role="img" aria-label="3D scatter plot of three output variables"></canvas>
                </div>
                <div class="chart-block" id="sum-chart-block">
                  <div class="chart-title">Sum</div>
                  <canvas id="sum-chart" width="900" height="310" role="img" aria-label="Stacked histogram of total output size"></canvas>
                </div>
              </div>
            </section>
          </div>
        </section>
      </section>
    </main>

    <script src="src/whichever.js"></script>
    <script src="src/app.js"></script>
  </body>
</html>
